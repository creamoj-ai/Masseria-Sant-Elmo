<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="95" fill="none" stroke="#666" stroke-width="2"/>
  <g transform="translate(100, 100)">
    <!-- Speaker cone -->
    <path d="M -8 5 L -8 25 L 8 25 L 8 5 Z" fill="none" stroke="#666" stroke-width="2.5"/>
    <!-- Speaker surround -->
    <ellipse cx="0" cy="5" rx="9" ry="4" fill="none" stroke="#666" stroke-width="2"/>
    <!-- Sound waves -->
    <path d="M -2 -10 Q -8 -15 -8 -22" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 2 -8 Q 10 -16 15 -25" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 -5 Q 0 -12 0 -20" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Crosshair center -->
    <circle cx="0" cy="8" r="2" fill="#666"/>
  </g>
</svg>