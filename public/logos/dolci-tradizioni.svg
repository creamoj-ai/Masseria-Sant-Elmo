<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="95" fill="none" stroke="#666" stroke-width="2"/>
  <g transform="translate(100, 100)">
    <!-- Cake base -->
    <ellipse cx="0" cy="20" rx="22" ry="8" fill="none" stroke="#666" stroke-width="2.5"/>
    <!-- Cake layer 1 -->
    <path d="M -20 12 L -18 8 L 18 8 L 20 12 Z" fill="none" stroke="#666" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Cake layer 2 -->
    <path d="M -16 2 L -14 -2 L 14 -2 L 16 2 Z" fill="none" stroke="#666" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Frosting top -->
    <path d="M -14 -2 Q -10 -8 0 -10 Q 10 -8 14 -2" fill="none" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Candle -->
    <line x1="0" y1="-10" x2="0" y2="-22" stroke="#666" stroke-width="2" stroke-linecap="round"/>
    <!-- Flame -->
    <path d="M 0 -22 Q -2 -27 0 -30 Q 2 -27 0 -22" fill="#999" opacity="0.7"/>
    <!-- Decoration dots -->
    <circle cx="-8" cy="10" r="1.5" fill="#666"/>
    <circle cx="0" cy="10" r="1.5" fill="#666"/>
    <circle cx="8" cy="10" r="1.5" fill="#666"/>
  </g>
</svg>